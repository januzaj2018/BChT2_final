specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: GameItem
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: GameItem
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - GameItem
        - Craft
      abis:
        - name: GameItem
          file: ./abis/GameItem.json
      eventHandlers:
        - event: ItemMinted(indexed address,indexed uint256,uint256)
          handler: handleItemMinted
        - event: ItemCrafted(indexed uint256,indexed address,uint256[],uint256[],uint256,uint256)
          handler: handleItemCrafted
      file: ./src/mappings.ts
  - kind: ethereum
    name: GameAMM
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: GameAMM
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - AMMLiquidity
        - Swap
      abis:
        - name: GameAMM
          file: ./abis/GameAMM.json
      eventHandlers:
        - event: LiquidityAdded(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityAdded
        - event: LiquidityRemoved(indexed address,uint256,uint256,uint256)
          handler: handleLiquidityRemoved
        - event: Swap(indexed address,indexed address,uint256,uint256)
          handler: handleSwap
      file: ./src/mappings.ts
  - kind: ethereum
    name: RentalVault
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: RentalVault
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VaultDeposit
      abis:
        - name: RentalVault
          file: ./abis/RentalVault.json
      eventHandlers:
        - event: NFTDeposited(indexed address,uint256,uint256,uint256)
          handler: handleNFTDeposited
      file: ./src/mappings.ts
  - kind: ethereum
    name: GameGovernor
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: GameGovernor
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Proposal
        - Vote
      abis:
        - name: GameGovernor
          file: ./abis/GameGovernor.json
      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
      file: ./src/mappings.ts
