name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FOUNDRY_PROFILE: ci

jobs:
  test:
    name: Foundry Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Show Forge version
        run: forge --version

      - name: Run tests
        run: forge test -vv

      - name: Run coverage
        run: forge coverage --report lcov

  lint:
    name: Solidity Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Check code formatting
        run: forge fmt --check

      - name: Install solhint
        run: npm install -g solhint

      - name: Run solhint
        run: solhint 'src/**/*.sol'
        continue-on-error: true

  slither:
    name: Slither Security Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Slither
        run: pip install slither-analyzer

      - name: Install Solc
        run: pip install solc-select && solc-select install 0.8.19 && solc-select use 0.8.19

      - name: Run Slither
        run: slither . --json --exclude naming-convention,external-function --continue-on-error
        continue-on-error: true
