type GameItem @entity {
  id: ID!
  tokenId: BigInt!
  owner: Bytes!
  balance: BigInt!
}

type AMMLiquidity @entity {
  id: ID!
  user: Bytes!
  lpAmount: BigInt!
  reserveX: BigInt!
  reserveY: BigInt!
}

type Swap @entity {
  id: ID!
  user: Bytes!
  tokenIn: Bytes!
  amountIn: BigInt!
  tokenOut: Bytes!
  amountOut: BigInt!
  timestamp: BigInt!
}

type Craft @entity {
  id: ID!
  user: Bytes!
  recipeId: BigInt!
  inputs: [BigInt!]!
  outputs: BigInt!
}

type VaultDeposit @entity {
  id: ID!
  user: Bytes!
  tokenId: BigInt!
  amount: BigInt!
  shares: BigInt!
  timestamp: BigInt!
}

type Proposal @entity {
  id: ID!
  proposer: Bytes!
  targets: [Bytes!]!
  values: [BigInt!]!
  signatures: [String!]!
  calldatas: [Bytes!]!
  startBlock: BigInt!
  endBlock: BigInt!
  description: String!
  status: String!
}

type Vote @entity {
  id: ID!
  voter: Bytes!
  proposalId: BigInt!
  support: Int!
  weight: BigInt!
  reason: String!
}
